# ==============================================================================
# pytest configuration for Archi3D
# ==============================================================================
# Run all tests with:  pytest tests/ -v
# Run a specific file: pytest tests/test_rule_engine.py -v
# Run a specific test: pytest tests/test_rule_engine.py::test_setback_calculation -v
# ==============================================================================

[pytest]
# Tell pytest-django where our Django settings are
DJANGO_SETTINGS_MODULE = archi3d.settings

# Look for tests in these directories
testpaths = tests

# Print live output from print() during tests (helpful for debugging)
addopts = -v --tb=short

# Markers — custom test categories you can filter with  pytest -m <marker>
markers =
    unit: Pure Python unit tests (no DB access)
    integration: Tests that touch the Django ORM / database
    slow: Tests that take longer (e.g., full pipeline tests)
